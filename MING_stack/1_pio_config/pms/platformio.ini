[env:pms7003]
platform = espressif8266
;board = d1_mini
board = nodemcuv2
framework = arduino

upload_speed = 115200

monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
monitor_filters = esp8266_exception_decoder

board_build.flash_mode = dout
board_build.f_cpu = 80000000L

lib_ldf_mode = deep+

lib_deps =
    knolleary/PubSubClient @ ^2.8

build_flags =
    -D MQTT_MAX_PACKET_SIZE=256
